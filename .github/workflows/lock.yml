name: Lock Threads

on:
  schedule:
    - cron: "0 6 1 * *"

permissions:
  issues: write
  pull-requests: write

jobs:
  lock:
    runs-on: ubuntu-latest
    timeout-minutes: 10
    steps:
      - uses: dessant/lock-threads@89ae32b08ed1a541efecbab17912962a5e38981c # v6.0.2
        with:
          issue-inactive-days: 90
          pr-inactive-days: 90
          issue-lock-reason: resolved
